<!DOCTYPE html>
<html>
<head>
    <title>Cek Jomok</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

    <h1>Cek Seberapa Jomok Anda 😘</h1>

    <input type="text" id="nama" placeholder="Masukkan nama">
    <br><br>
    <button onclick="cek()">Cek Sekarang</button>

    <h2 id="hasil"></h2>

    <!-- SCRIPT KAMU -->
    <script>
    function normalizeText(text) {
        return text
            .toLowerCase()
            .replace(/4/g, 'a')
            .replace(/3/g, 'e')
            .replace(/0/g, 'o')
            .replace(/1/g, 'i')
            .replace(/[^a-z\s]/g, '');
    }

    function cek() {
        let nama = document.getElementById("nama").value;
        let clean = normalizeText(nama);

        let persen;
        let pesan = "";

        if (
            clean.includes("asep") ||
            clean.includes("bintang") ||
            clean.includes("muhammad")
        ) {
            persen = 0;
        } else {
            persen = Math.floor(Math.random() * 101);
        }

        if (persen === 0) {
            pesan = "Kamu orang baik bang 😇";
        } else if (persen === 100) {
            pesan = "kesayangan atmin😘";
        } else if (persen > 80) {
            pesan = "Jomok banget 😜";
        } else if (persen > 50) {
            pesan = "Kok kamu jomok bang🤭";
        } else if (persen > 30) {
            pesan = "Jomok dikit🤨";
        } else if (persen > 10) {
            pesan = "Fomok😒";
        } else {
            pesan = "Suki😡";
        }

        document.getElementById("hasil").innerText =
            nama + ", tingkat jomok kamu: " + persen + "% - " + pesan;
    }
    </script>

</body>
</html>
