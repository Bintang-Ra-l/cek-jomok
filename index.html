<script>
function normalizeText(text) {
    return text
        .toLowerCase()
        .replace(/4/g, 'a')
        .replace(/3/g, 'e')
        .replace(/0/g, 'o')
        .replace(/1/g, 'i')
        .replace(/[^a-z\s]/g, ''); // hapus simbol aneh
}

function cek() {
    let nama = document.getElementById("nama").value;
    let clean = normalizeText(nama);

    let persen;
    let pesan = "";

    // 🔥 Rule khusus
    if (
        clean.includes("asep") ||
        clean.includes("bintang") ||
        clean.includes("muhammad")
    ) {
        persen = 0;
    } else {
        persen = Math.floor(Math.random() * 101);
    }

    // 🎭 Pesan berdasarkan persen
    if (persen === 0) {
        pesan = "Kamu orang baik bang 😇";
    } else if (persen === 100) {
        pesan = "kesayangan atmin😘";
    } else if (persen > 80) {
        pesan = "Jomok banget 😜";
    } else if (persen > 50) {
        pesan = "Kok kamu jomok bang🤭";
    } else if (persen > 30) {
        pesan = "Jomok dikit🤨";
    } else if (persen > 10) {
        pesan = "Fomok😒";
    } else {
        pesan = "Suki😡";
    }

    document.getElementById("hasil").innerText =
        nama + ", tingkat jomok kamu: " + persen + "% - " + pesan;
}
</script>
